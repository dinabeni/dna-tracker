<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Didi — Mascotte DNA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #1a0033 0%, #2d0066 50%, #1a0033 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* FOND ANIMÉ */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(147,51,234,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(107,33,168,0.2) 0%, transparent 50%);
      animation: bgMove 6s ease-in-out infinite alternate;
    }
    @keyframes bgMove {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* ÉTOILES */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* SCÈNE PRINCIPALE */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* TITRE DNA */
    .dna-title {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, #cc99ff 50%, #9333EA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 6px;
      text-align: center;
    }

    .dna-slogan {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      font-style: italic;
      margin-top: -20px;
      letter-spacing: 1px;
    }

    /* DIDI CONTAINER */
    .didi-scene {
      position: relative;
      width: 320px;
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* HALO LUMINEUX */
    .didi-halo {
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(147,51,234,0.4) 0%, transparent 70%);
      animation: haloGlow 3s ease-in-out infinite;
    }
    @keyframes haloGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    /* DIDI SVG */
    .didi-svg {
      position: relative;
      z-index: 2;
      animation: didiFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(147,51,234,0.5));
    }
    @keyframes didiFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
    }

    /* AILE GAUCHE */
    .wing-left {
      animation: wingLeft 0.8s ease-in-out infinite alternate;
      transform-origin: right center;
    }
    @keyframes wingLeft {
      0% { transform: rotate(-15deg) scaleX(0.9); }
      100% { transform: rotate(10deg) scaleX(1.1); }
    }

    /* AILE DROITE */
    .wing-right {
      animation: wingRight 0.8s ease-in-out infinite alternate;
      transform-origin: left center;
    }
    @keyframes wingRight {
      0% { transform: rotate(15deg) scaleX(0.9); }
      100% { transform: rotate(-10deg) scaleX(1.1); }
    }

    /* YEUX */
    .eye-blink {
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.05); }
    }

    /* QUEUE */
    .tail {
      animation: tailWag 1.5s ease-in-out infinite alternate;
      transform-origin: top center;
    }
    @keyframes tailWag {
      0% { transform: rotate(-10deg); }
      100% { transform: rotate(10deg); }
    }

    /* BULLE DE DIALOGUE */
    .bubble {
      position: absolute;
      top: 10px;
      right: -20px;
      background: white;
      border-radius: 20px 20px 20px 4px;
      padding: 12px 16px;
      max-width: 160px;
      box-shadow: 0 8px 30px rgba(107,33,168,0.3);
      animation: bubblePop 0.5s cubic-bezier(0.34,1.56,0.64,1) both,
                 bubbleFloat 3s ease-in-out infinite 0.5s;
      z-index: 3;
    }
    @keyframes bubblePop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes bubbleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .bubble-text {
      font-size: 12px;
      font-weight: 700;
      color: #6B21A8;
      line-height: 1.4;
    }
    .bubble-emoji { font-size: 18px; display: block; margin-bottom: 4px; }

    /* SOL */
    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 60px;
    }

    /* TAXI DNA */
    .taxi-container {
      position: absolute;
      bottom: 30px;
      animation: taxiSlide 8s ease-in-out infinite;
    }
    @keyframes taxiSlide {
      0% { transform: translateX(-200px); opacity: 0; }
      10% { opacity: 1; }
      40% { transform: translateX(0); }
      60% { transform: translateX(0); }
      90% { opacity: 1; }
      100% { transform: translateX(200px); opacity: 0; }
    }

    /* BOUTONS */
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 1;
    }
    .btn-pose {
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      color: white;
    }
    .btn-pose:hover { transform: translateY(-4px); }
    .btn-pose:active { transform: translateY(-2px) scale(0.97); }

    .btn-1 { background: linear-gradient(135deg, #6B21A8, #9333EA); box-shadow: 0 6px 20px rgba(107,33,168,0.4); }
    .btn-2 { background: linear-gradient(135deg, #10B981, #059669); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
    .btn-3 { background: linear-gradient(135deg, #F59E0B, #D97706); box-shadow: 0 6px 20px rgba(245,158,11,0.4); }
    .btn-4 { background: linear-gradient(135deg, #EF4444, #DC2626); box-shadow: 0 6px 20px rgba(239,68,68,0.4); }
    .btn-5 { background: linear-gradient(135deg, #3B82F6, #2563EB); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }

    /* CONFETTIS */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .confetti {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall linear infinite;
      display: none;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* BADGE DNA */
    .dna-badge {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #6B21A8, #9333EA);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 2px;
      z-index: 3;
      box-shadow: 0 4px 15px rgba(107,33,168,0.4);
    }

    /* PARTICULES AUTOUR DE DIDI */
    .particle-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(147,51,234,0.3);
      animation: ringExpand 3s ease-out infinite;
    }
    .particle-ring:nth-child(1) { width: 180px; height: 180px; animation-delay: 0s; }
    .particle-ring:nth-child(2) { width: 220px; height: 220px; animation-delay: 1s; }
    .particle-ring:nth-child(3) { width: 260px; height: 260px; animation-delay: 2s; }
    @keyframes ringExpand {
      0% { transform: scale(0.5); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* DOWNLOAD BTN */
    .download-section {
      z-index: 1;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-download {
      padding: 12px 24px;
      border-radius: 25px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .btn-download:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

  <!-- ÉTOILES -->
  <div class="stars" id="stars"></div>

  <!-- CONFETTIS -->
  <div class="confetti-container" id="confetti"></div>

  <div class="scene">

    <!-- TITRE -->
    <div>
      <div class="dna-title">DNA</div>
      <div class="dna-slogan">C'est pas juste une course, c'est une histoire</div>
    </div>

    <!-- DIDI -->
    <div class="didi-scene">

      <!-- ANNEAUX -->
      <div class="particle-ring"></div>
      <div class="particle-ring"></div>
      <div class="particle-ring"></div>

      <!-- HALO -->
      <div class="didi-halo"></div>

      <!-- BULLE -->
      <div class="bubble" id="bubble">
        <span class="bubble-emoji">🧬</span>
        <span class="bubble-text" id="bubbleText">Bonjour Pointe-Noire !</span>
      </div>

      <!-- DIDI SVG -->
      <svg class="didi-svg" id="didiSvg" width="200" height="240" viewBox="0 0 200 240">

        <!-- QUEUE -->
        <g class="tail" transform="translate(100, 195)">
          <ellipse cx="0" cy="0" rx="8" ry="25" fill="#4A0080" opacity="0.8"/>
          <ellipse cx="-10" cy="5" rx="6" ry="20" fill="#6B21A8" opacity="0.7" transform="rotate(-20)"/>
          <ellipse cx="10" cy="5" rx="6" ry="20" fill="#6B21A8" opacity="0.7" transform="rotate(20)"/>
        </g>

        <!-- AILE GAUCHE -->
        <g class="wing-left" transform="translate(42, 105)">
          <ellipse cx="0" cy="0" rx="38" ry="18" fill="#9333EA" opacity="0.9"/>
          <ellipse cx="-5" cy="5" rx="28" ry="12" fill="#7C3AED" opacity="0.8"/>
          <ellipse cx="-10" cy="10" rx="18" ry="8" fill="#6B21A8" opacity="0.7"/>
          <!-- Plumes -->
          <ellipse cx="-30" cy="-5" rx="12" ry="6" fill="#A855F7" opacity="0.6" transform="rotate(-15)"/>
          <ellipse cx="-35" cy="5" rx="10" ry="5" fill="#9333EA" opacity="0.5" transform="rotate(-10)"/>
        </g>

        <!-- AILE DROITE -->
        <g class="wing-right" transform="translate(158, 105)">
          <ellipse cx="0" cy="0" rx="38" ry="18" fill="#9333EA" opacity="0.9"/>
          <ellipse cx="5" cy="5" rx="28" ry="12" fill="#7C3AED" opacity="0.8"/>
          <ellipse cx="10" cy="10" rx="18" ry="8" fill="#6B21A8" opacity="0.7"/>
          <!-- Plumes -->
          <ellipse cx="30" cy="-5" rx="12" ry="6" fill="#A855F7" opacity="0.6" transform="rotate(15)"/>
          <ellipse cx="35" cy="5" rx="10" ry="5" fill="#9333EA" opacity="0.5" transform="rotate(10)"/>
        </g>

        <!-- CORPS PRINCIPAL -->
        <ellipse cx="100" cy="130" rx="55" ry="65" fill="url(#bodyGrad)"/>

        <!-- VENTRE BLANC -->
        <ellipse cx="100" cy="140" rx="35" ry="45" fill="white" opacity="0.9"/>

        <!-- TÊTE -->
        <circle cx="100" cy="75" r="48" fill="url(#headGrad)"/>

        <!-- CRÊTE -->
        <ellipse cx="100" cy="30" rx="8" ry="18" fill="#A855F7" transform="rotate(-10, 100, 30)"/>
        <ellipse cx="112" cy="32" rx="6" ry="14" fill="#9333EA" transform="rotate(5, 112, 32)"/>
        <ellipse cx="88" cy="33" rx="6" ry="14" fill="#9333EA" transform="rotate(-5, 88, 33)"/>
        <ellipse cx="100" cy="27" rx="5" ry="12" fill="#C084FC"/>

        <!-- YEUX -->
        <!-- Oeil gauche -->
        <g class="eye-blink" transform="translate(80, 70)">
          <circle cx="0" cy="0" r="14" fill="white"/>
          <circle cx="0" cy="0" r="10" fill="#1E1B4B"/>
          <circle cx="0" cy="0" r="6" fill="#6B21A8"/>
          <circle cx="0" cy="0" r="3" fill="black"/>
          <circle cx="3" cy="-3" r="2.5" fill="white"/>
          <circle cx="-4" cy="4" r="1.5" fill="white" opacity="0.6"/>
        </g>
        <!-- Oeil droit -->
        <g class="eye-blink" transform="translate(120, 70)">
          <circle cx="0" cy="0" r="14" fill="white"/>
          <circle cx="0" cy="0" r="10" fill="#1E1B4B"/>
          <circle cx="0" cy="0" r="6" fill="#6B21A8"/>
          <circle cx="0" cy="0" r="3" fill="black"/>
          <circle cx="3" cy="-3" r="2.5" fill="white"/>
          <circle cx="-4" cy="4" r="1.5" fill="white" opacity="0.6"/>
        </g>

        <!-- BEC -->
        <g transform="translate(100, 93)">
          <path d="M-12,0 Q0,-8 12,0 Q8,12 0,15 Q-8,12 -12,0Z" fill="#F59E0B"/>
          <path d="M-12,0 Q0,0 12,0 Q8,6 0,8 Q-8,6 -12,0Z" fill="#D97706"/>
          <line x1="-8" y1="2" x2="8" y2="2" stroke="#92400E" stroke-width="1" opacity="0.5"/>
        </g>

        <!-- JOUES ROSES -->
        <ellipse cx="72" cy="82" rx="10" ry="7" fill="#F9A8D4" opacity="0.5"/>
        <ellipse cx="128" cy="82" rx="10" ry="7" fill="#F9A8D4" opacity="0.5"/>

        <!-- BADGE DNA SUR LE CORPS -->
        <rect x="72" y="135" width="56" height="20" rx="10" fill="#6B21A8"/>
        <text x="100" y="149" text-anchor="middle" font-family="Poppins" font-size="9" font-weight="700" fill="white" letter-spacing="2">DNA</text>

        <!-- PATTES -->
        <g transform="translate(82, 193)">
          <rect x="-4" y="0" width="8" height="20" rx="4" fill="#F59E0B"/>
          <rect x="-8" y="18" width="8" height="5" rx="2" fill="#D97706" transform="rotate(-20, 0, 18)"/>
          <rect x="0" y="18" width="8" height="5" rx="2" fill="#D97706"/>
          <rect x="4" y="18" width="8" height="5" rx="2" fill="#D97706" transform="rotate(20, 8, 18)"/>
        </g>
        <g transform="translate(118, 193)">
          <rect x="-4" y="0" width="8" height="20" rx="4" fill="#F59E0B"/>
          <rect x="-8" y="18" width="8" height="5" rx="2" fill="#D97706" transform="rotate(-20, 0, 18)"/>
          <rect x="0" y="18" width="8" height="5" rx="2" fill="#D97706"/>
          <rect x="4" y="18" width="8" height="5" rx="2" fill="#D97706" transform="rotate(20, 8, 18)"/>
        </g>

        <!-- DÉGRADÉS -->
        <defs>
          <radialGradient id="bodyGrad" cx="40%" cy="30%">
            <stop offset="0%" stop-color="#A855F7"/>
            <stop offset="60%" stop-color="#7C3AED"/>
            <stop offset="100%" stop-color="#4A0080"/>
          </radialGradient>
          <radialGradient id="headGrad" cx="35%" cy="30%">
            <stop offset="0%" stop-color="#C084FC"/>
            <stop offset="50%" stop-color="#9333EA"/>
            <stop offset="100%" stop-color="#6B21A8"/>
          </radialGradient>
        </defs>

      </svg>

      <!-- BADGE -->
      <div class="dna-badge">🧬 DIDI</div>

      <!-- TAXI -->
      <div class="taxi-container">
        <svg width="120" height="50" viewBox="0 0 120 50">
          <rect x="10" y="15" width="100" height="28" rx="8" fill="#6B21A8"/>
          <rect x="20" y="8" width="70" height="20" rx="6" fill="#9333EA"/>
          <rect x="25" y="10" width="25" height="14" rx="3" fill="#BFDBFE" opacity="0.8"/>
          <rect x="58" y="10" width="25" height="14" rx="3" fill="#BFDBFE" opacity="0.8"/>
          <circle cx="30" cy="43" r="8" fill="#1E1B4B"/>
          <circle cx="30" cy="43" r="5" fill="#374151"/>
          <circle cx="90" cy="43" r="8" fill="#1E1B4B"/>
          <circle cx="90" cy="43" r="5" fill="#374151"/>
          <text x="60" y="33" text-anchor="middle" font-family="Poppins" font-size="7" font-weight="900" fill="white" letter-spacing="2">DNA</text>
          <rect x="5" y="22" width="8" height="4" rx="2" fill="#FCD34D"/>
          <rect x="107" y="22" width="8" height="4" rx="2" fill="#EF4444"/>
        </svg>
      </div>

    </div>

    <!-- BOUTONS POSES -->
    <div class="buttons">
      <button class="btn-pose btn-1" onclick="changerPose('bonjour')">👋 Bonjour</button>
      <button class="btn-pose btn-2" onclick="changerPose('joie')">🎉 Joie</button>
      <button class="btn-pose btn-3" onclick="changerPose('wifi')">📶 WiFi</button>
      <button class="btn-pose btn-4" onclick="changerPose('non')">😤 Non</button>
      <button class="btn-pose btn-5" onclick="changerPose('recrute')">💪 Recrute</button>
    </div>

    <!-- DOWNLOAD -->
    <div class="download-section">
      <button class="btn-download" onclick="capturerDidi()">📸 Capturer Didi</button>
      <button class="btn-download" onclick="lancerConfettis()">🎊 Confettis</button>
    </div>

  </div>

  <script>
    // ÉTOILES
    const starsContainer = document.getElementById('stars');
    for(let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.cssText = `
        width:${size}px;height:${size}px;
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        animation-duration:${Math.random()*3+2}s;
        animation-delay:${Math.random()*3}s;
      `;
      starsContainer.appendChild(star);
    }

    // POSES DE DIDI
    const poses = {
      bonjour: {
        text: "Bonjour Pointe-Noire ! 🇨🇬",
        emoji: "👋",
        animation: "didiFloat 3s ease-in-out infinite",
        action: () => {}
      },
      joie: {
        text: "C'est une histoire ! 🎉",
        emoji: "🎊",
        animation: "didiJump 0.5s ease-in-out infinite alternate",
        action: lancerConfettis
      },
      wifi: {
        text: "WiFi gratuit chez DNA ! 📶",
        emoji: "📶",
        animation: "didiFloat 1s ease-in-out infinite",
        action: () => {}
      },
      non: {
        text: "Pas ce taxi là ! 😤",
        emoji: "🚫",
        animation: "didiShake 0.3s ease-in-out infinite",
        action: () => {}
      },
      recrute: {
        text: "Rejoins DNA ! 💪",
        emoji: "💪",
        animation: "didiFloat 2s ease-in-out infinite",
        action: () => {}
      }
    };

    // STYLES D'ANIMATION SUPPLÉMENTAIRES
    const style = document.createElement('style');
    style.textContent = `
      @keyframes didiJump {
        0% { transform: translateY(0) rotate(-2deg) scale(1); }
        100% { transform: translateY(-40px) rotate(5deg) scale(1.05); }
      }
      @keyframes didiShake {
        0% { transform: translateX(0) rotate(-5deg); }
        25% { transform: translateX(-10px) rotate(5deg); }
        75% { transform: translateX(10px) rotate(-5deg); }
        100% { transform: translateX(0) rotate(0deg); }
      }
    `;
    document.head.appendChild(style);

    function changerPose(pose) {
      const p = poses[pose];
      document.getElementById('bubbleText').textContent = p.text;
      document.querySelector('.bubble-emoji').textContent = p.emoji;
      document.getElementById('didiSvg').style.animation = p.animation;
      if(p.action) p.action();
    }

    // ROTATION AUTOMATIQUE DES MESSAGES
    const messages = [
      { text: "Bonjour Pointe-Noire ! 🇨🇬", emoji: "👋" },
      { text: "C'est pas juste une course... 🧬", emoji: "✨" },
      { text: "WiFi gratuit dans le taxi ! 📶", emoji: "📶" },
      { text: "Prix fixe, pas de surprise ! 💰", emoji: "💰" },
      { text: "Rejoins la famille DNA ! 💪", emoji: "🚕" },
      { text: "C'est une histoire ! 🎉", emoji: "🎊" }
    ];

    let msgIndex = 0;
    setInterval(() => {
      msgIndex = (msgIndex + 1) % messages.length;
      document.getElementById('bubbleText').textContent = messages[msgIndex].text;
      document.querySelector('.bubble-emoji').textContent = messages[msgIndex].emoji;
    }, 3000);

    // CONFETTIS
    function lancerConfettis() {
      const colors = ['#6B21A8','#9333EA','#F59E0B','#10B981','#ffffff','#A855F7'];
      const container = document.getElementById('confetti');
      for(let i = 0; i < 80; i++) {
        setTimeout(() => {
          const conf = document.createElement('div');
          conf.className = 'confetti';
          conf.style.cssText = `
            display:block;
            left:${Math.random()*100}%;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            width:${Math.random()*10+5}px;
            height:${Math.random()*10+5}px;
            border-radius:${Math.random()>0.5?'50%':'2px'};
            animation:confettiFall ${Math.random()*2+1}s linear forwards;
            animation-delay:${Math.random()*0.5}s;
          `;
          container.appendChild(conf);
          setTimeout(() => conf.remove(), 3000);
        }, i * 20);
      }
    }

    // CAPTURER DIDI
