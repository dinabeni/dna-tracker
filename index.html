<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA Transport</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #1a0033;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo {
      font-size: 40px;
      font-weight: bold;
      color: #cc99ff;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 16px;
      color: #9966cc;
      margin-bottom: 50px;
      text-align: center;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 350px;
      padding: 20px;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      margin-bottom: 15px;
      transition: all 0.3s;
    }
    .btn-chauffeur {
      background: #6600cc;
      color: white;
    }
    .btn-tracking {
      background: #2d0066;
      color: #cc99ff;
      border: 2px solid #6600cc;
    }
    .version {
      font-size: 11px;
      color: #3d0080;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="logo">🧬 DNA</div>
  <div class="subtitle">Transport — Pointe-Noire</div>
  
  <a href="/chauffeur.html" class="btn btn-chauffeur">
    🚕 App Chauffeur
  </a>
  
  <a href="/tracking.html" class="btn btn-tracking">
    📍 Suivi de course
  </a>
  
  <div class="version">DNA Transport v1.0 — Pointe-Noire, Congo 🇨🇬</div>
</body>
</html>
